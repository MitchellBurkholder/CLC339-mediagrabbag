<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="layouts/defaultTemplate">
<head>
    <meta charset="UTF-8">
    <title>AddProduct</title>
</head>
<body>
<div layout:fragment="content">
    <form action="#" th:action="@{doAddProduct}" th:object="${productModel}" method="post">
        <table>
            <tr>
                <td>
                    <select th:field="*{type}">
                        <option th:each="t : ${T(com.grabbag.model.products.ProductType).values()}"
                                th:value="${t}"
                                th:text="${t}">
                        </option>
                    </select>
                </td>
                <td><h5 style="color:red" th:if="${#fields.hasErrors('type')}" th:errors="*{type}">Type Error</h5></td>
            </tr>
            <tr>
                <td>Title</td><td><input type="text" th:field="*{title}"></td>
                <td><h5 style="color:red" th:if="${#fields.hasErrors('title')}" th:errors="*{title}">Title Error</h5></td>
            </tr>
            <tr>
                <td>
                    <div class="hover-text"
                         title="Book Only">
                        Author
                    </div>
                </td>
                <td><input type="text" th:field="*{author}"></td>
                <td><h5 style="color:red" th:if="${#fields.hasErrors('author')}" th:errors="*{author}">
                    Author Name Error</h5></td>
            </tr>
            <tr>
                <td>
                    <div class="hover-text"
                         title="Movie or TV Show Only">
                        Duration in Hours
                    </div>
                </td>
                <td><input type="number" th:field="*{durationInHours}"></td>
                <td><h5 style="color:red" th:if="${#fields.hasErrors('durationInHours')}"
                        th:errors="*{durationInHours}">
                    Duration Error</h5></td>
            </tr>
            <tr>
                <td>
                    <div class="hover-text"
                         title="Video Game Only">
                        Amount of Players
                    </div>
                </td>
                <td><input type="text" th:field="*{numPlayers}"></td>
                <td><h5 style="color:red" th:if="${#fields.hasErrors('numPlayers')}" th:errors="*{numPlayers}">
                    Number of Players Error</h5></td>
            </tr>
            <tr>
                <td>
                    <div class="hover-text"
                         title="Video Game Only">
                        Required Equipment
                    </div>
                </td>
                <td><input type="text" th:field="*{requiredEquipment}"></td>
                <td><h5 style="color:red" th:if="${#fields.hasErrors('requiredEquipment')}"
                        th:errors="*{requiredEquipment}">
                    Required Equipment Error</h5></td>
            </tr>
            <tr>
                <td>Age Rating</td><td><input type="text" th:field="*{ageRating}" ></td>
                <td><h5 style="color:red" th:if="${#fields.hasErrors('ageRating')}" th:errors="*{ageRating}">Age Rating Error</h5></td>
            </tr>
            <tr>
                <td>Main Genre</td><td><input type="text" th:field="*{genre}"></td>
                <td><h5 style="color:red" th:if="${#fields.hasErrors('genre')}" th:errors="*{genre}">Genre Error</h5></td>
            </tr>
            <tr>
                <td>Date</td><td><input type="text" th:field="*{date}" ></td>
                <td><h5 style="color:red" th:if="${#fields.hasErrors('date')}" th:errors="*{date}">Date Error</h5></td>
            </tr>
            <tr>
                <td>Publisher/Studio</td><td><input type="text" th:field="*{publisherOrStudio}"></td>
                <td><h5 style="color:red" th:if="${#fields.hasErrors('publisherOrStudio')}" th:errors="*{publisherOrStudio}">
                    Publisher or Studio Error</h5></td>
            </tr>
            <tr>
                <div class="submitButton">
                    <td colspan="3" style="text-align:center;">
                        <input type="submit" value="Submit">
                    </td>
                </div>
            </tr>
        </table>
        <div th:if="${#fields.hasErrors('*')}">List of Errors</div>
        <div th:each="err : ${#fields.errors('*')}">
            <span style="color:red" th:text="${err}" class="fieldError"></span>
        </div>
    </form>
</div>
</body>
</html>
