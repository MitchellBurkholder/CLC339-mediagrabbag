<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="layouts/defaultTemplate">
<head></head>
	<body>
		<div layout:fragment="content">
			<form action="#" th:action="@{doLogin}" th:object="${loginModel}" method="post">
				<table>
					<tr>
						<td>UserName:</td>
						<td><input type="text" th:field="*{username}"></td>
						<td><h5 style="color:red" th:if="${#fields.hasErrors('username')}" th:errors="*{username}">
							Username Error</h5></td>
					</tr>
					<tr>
						<td>Password:</td>
						<td><input type="password" th:field="*{password}"></td>
						<td><h5 style="color:red" th:if="${#fields.hasErrors('password')}" th:errors="*{password}">
							Password Error</h5></td>
					</tr>
					<tr>
						<div class="submitButton">
							<td colspan="3" style="text-align:center;">
								<input type="submit" value="Submit">
							</td>
						</div>
					</tr>
				</table>
				<div th:if="${#fields.hasErrors('global')}">
					<h3>Global errors:</h3>
					<p th:each="err : ${#fields.errors('global')}" th:text="${err}" class="error"/>
				</div>
				<div th:if="${#fields.hasErrors('*')}">List of Errors</div>
				<div th:each="err : ${#fields.errors('*')}">
					<span style="color:red" th:text="${err}" class="fieldError"></span>
				</div>
			</form>
		</div>
	</body>
</html>
